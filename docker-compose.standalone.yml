services:
  mobius:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - OPENCLAW_ENABLED=true
      - OPENCLAW_GATEWAY_URL=ws://openclaw:18789
      - OPENCLAW_WEBHOOK_URL=http://openclaw:18789/hooks/wake
      - OPENAI_BASE_URL=http://ark-proxy:18792/v1
    depends_on:
      ark-proxy:
        condition: service_started
      openclaw:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  ark-proxy:
    build:
      context: ./services/ark-proxy
      dockerfile: Dockerfile
    ports:
      - "18792:18792"
    environment:
      - ARK_API_KEY=${OPENAI_API_KEY}
      - ARK_BASE_URL=${OPENAI_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding/v1}
      - ARK_MODEL=${OPENAI_MODEL:-ark-code-latest}
      - PROXY_PORT=18792
    restart: unless-stopped

  openclaw:
    image: openclaw:local
    user: root
    ports:
      - "18789:18789"
    environment:
      HOME: /home/node
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-ark-code-latest}
    volumes:
      - openclaw-config:/home/node/.openclaw
      - ./lib/openclaw/skills:/app/skills:ro
    command:
      [
        "sh",
        "-c",
        "chown -R node:node /home/node/.openclaw && exec node dist/index.js gateway --bind lan --port 18789 --allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  openclaw-config:
