services:
  mobius:
    build: .
    ports:
      - "3000:3000"
    environment:
      - OPENCLAW_GATEWAY_URL=ws://openclaw:18789
      - OPENCLAW_WEBHOOK_URL=http://openclaw:18789/hooks/wake
      - OPENCLAW_ENABLED=${OPENCLAW_ENABLED:-true}
    depends_on:
      openclaw:
        condition: service_healthy
    env_file:
      - .env.local

  openclaw:
    image: openclaw/gateway:latest
    ports:
      - "18789:18789"
    volumes:
      - ./lib/openclaw/skills:/app/skills:ro
      - openclaw-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 10s
      retries: 5
      start_period: 30s

volumes:
  openclaw-data:
