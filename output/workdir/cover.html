<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 794px; height: 1123px;
    overflow: hidden;
    background: #151C27;
    font-family: 'EB Garamond', 'Helvetica Neue', Helvetica, Arial, sans-serif;
}
.page {
    position: relative;
    width: 794px; height: 1123px;
    background: #151C27;
    overflow: hidden;
}

html, body { background: #151C27; }
.page { background: #151C27; display:flex; flex-direction:column;
         align-items:center; justify-content:center; padding:60px 80px; }

.org-name {
    font-size: 9px; font-weight: 500; letter-spacing: 0.30em;
    text-transform: uppercase; color: #EDE9E2; text-align:center;
    opacity: 0.75; margin-bottom: 10px;
}
.org-rule {
    width: 56px; height: 2px; background: #EDE9E2;
    opacity: 0.35; margin: 0 auto 52px;
}
.title {
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    font-weight: 700; font-size: 52px; line-height: 1.08;
    color: #EDE9E2; text-align: center; letter-spacing: -0.015em;
    max-width: 560px; word-wrap: break-word; margin-bottom: 18px;
}
.title-rule {
    width: 44px; height: 2.5px; background: #EDE9E2;
    opacity: 0.35; margin: 0 auto 20px;
}
.subtitle {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic; font-size: 14px; color: #6B7280;
    text-align: center; line-height: 1.5; max-width: 440px;
    margin: 0 auto;
}
.separator {
    width: 100%; max-width: 620px; height: 1px;
    background: #EDE9E2; opacity: 0.12;
    margin: 28px auto;
}
.author-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 16px; font-weight: 700; color: #EDE9E2;
    text-align: center; margin-bottom: 6px;
}
.date-line {
    font-size: 11px; color: #6B7280; text-align: center;
    letter-spacing: 0.03em;
}
</style>
</head>
<body>
<div class="page">
    <div class="org-name">DARKROOM</div>
    <div class="org-rule"></div>
    <div class="title">莫比乌斯计划</div>
    <div class="title-rule"></div>
    <div class="subtitle">从高压面试诊断到专属职场外脑</div>
    
    
    <div style="margin:28px 0;"></div>
    <div class="author-name">Mobius Project Team</div>
    <div class="date-line">2026年3月</div>
</div>
</body></html>
